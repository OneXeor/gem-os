x-gem-app: &gem-app
  image: gem-os-app
  build: .

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gem
      POSTGRES_PASSWORD: gem
      POSTGRES_DB: gem
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gem -d gem"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--host", "0.0.0.0", "--port", "4000"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gem:gem@postgres:5432/gem
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  provider-router:
    <<: *gem-app
    command: java -cp /app/lib/* com.onexeor.gemos.provider.ProviderRouterMainKt
    env_file:
      - .env
    environment:
      GEM_HOME: /app
      DATABASE_URL: postgresql://gem:gem@postgres:5432/gem
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY}
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  admin:
    <<: *gem-app
    command: java -cp /app/lib/* com.onexeor.gemos.admin.AdminMainKt
    env_file:
      - .env
    environment:
      GEM_HOME: /app
      DATABASE_URL: postgresql://gem:gem@postgres:5432/gem
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      LITELLM_BASE_URL: http://litellm:4000
    ports:
      - "8000:8000"
    depends_on:
      provider-router:
        condition: service_started

  scheduler:
    <<: *gem-app
    command: java -cp /app/lib/* com.onexeor.gemos.scheduler.SchedulerMainKt --status
    env_file:
      - .env
    environment:
      GEM_HOME: /app
    depends_on:
      postgres:
        condition: service_healthy

  slack-bot:
    <<: *gem-app
    command: java -cp /app/lib/* com.onexeor.gemos.scheduler.SchedulerMainKt --status
    env_file:
      - .env
    environment:
      GEM_HOME: /app
    profiles:
      - slack
    depends_on:
      provider-router:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    profiles:
      - tunnel
    depends_on:
      admin:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      admin:
        condition: service_started
      provider-router:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-gem}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
