x-gem-app: &gem-app
  image: gem-os-app
  build: .

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gem
      POSTGRES_PASSWORD: gem
      POSTGRES_DB: gem_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gem -d gem_os"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  bge-m3:
    image: michaelf34/infinity:latest-cpu
    platform: linux/amd64
    restart: unless-stopped
    environment:
      DO_NOT_TRACK: "1"
    command:
      - v2
      - --model-id
      - BAAI/bge-m3
      - --engine
      - torch
      - --no-compile
      - --no-bettertransformer
      - --no-model-warmup
      - --port
      - "7997"
    volumes:
      - bge_m3_cache:/app/.cache

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    command: ["--host", "0.0.0.0", "--port", "4000"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${LITELLM_DATABASE_URL:-postgresql://gem:gem@postgres:5432/gem}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      bge-m3:
        condition: service_started

  provider-router:
    <<: *gem-app
    restart: unless-stopped
    command: java -cp /app/lib/* com.onexeor.gemos.provider.ProviderRouterMainKt
    env_file:
      - .env
    environment:
      GEM_HOME: /app
      DATABASE_URL: postgresql://gem:gem@postgres:5432/gem_os
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      EMBEDDINGS_BASE_URL: http://bge-m3:7997
      EMBEDDINGS_MODEL: BAAI/bge-m3
      EMBEDDINGS_VECTOR_SIZE: 1024
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY}
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  brain:
    <<: *gem-app
    restart: unless-stopped
    command: java -cp /app/lib/* com.onexeor.gemos.brain.BrainMainKt
    env_file:
      - .env
    environment:
      GEM_HOME: /app
      DATABASE_URL: postgresql://gem:gem@postgres:5432/gem_os
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      EMBEDDINGS_BASE_URL: http://bge-m3:7997
      EMBEDDINGS_MODEL: BAAI/bge-m3
      EMBEDDINGS_VECTOR_SIZE: 1024
      LITELLM_BASE_URL: http://litellm:4000
    ports:
      - "8020:8020"
    depends_on:
      provider-router:
        condition: service_started

  admin:
    <<: *gem-app
    restart: unless-stopped
    command: java -cp /app/lib/* com.onexeor.gemos.admin.AdminMainKt
    env_file:
      - .env
    environment:
      GEM_HOME: /app
      DATABASE_URL: postgresql://gem:gem@postgres:5432/gem_os
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      EMBEDDINGS_BASE_URL: http://bge-m3:7997
      EMBEDDINGS_MODEL: BAAI/bge-m3
      EMBEDDINGS_VECTOR_SIZE: 1024
      LITELLM_BASE_URL: http://litellm:4000
    ports:
      - "8000:8000"
    depends_on:
      brain:
        condition: service_started

  scheduler:
    <<: *gem-app
    restart: "no"
    command: java -cp /app/lib/* com.onexeor.gemos.scheduler.SchedulerMainKt --status
    env_file:
      - .env
    environment:
      GEM_HOME: /app
    depends_on:
      postgres:
        condition: service_healthy

  slack-bot:
    <<: *gem-app
    restart: unless-stopped
    command: java -cp /app/lib/* com.onexeor.gemos.slack.SlackBotMainKt
    env_file:
      - .env
    environment:
      GEM_HOME: /app
      DATABASE_URL: postgresql://gem:gem@postgres:5432/gem_os
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      EMBEDDINGS_BASE_URL: http://bge-m3:7997
      EMBEDDINGS_MODEL: BAAI/bge-m3
      EMBEDDINGS_VECTOR_SIZE: 1024
      LITELLM_BASE_URL: http://litellm:4000
      BRAIN_BASE_URL: http://brain:8020
      CODEX_RUNNER_BASE_URL: ${CODEX_RUNNER_BASE_URL}
      CODEX_RUNNER_TIMEOUT_MS: ${CODEX_RUNNER_TIMEOUT_MS:-900000}
      SLACK_PORT: 8030
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_ALLOWED_USERS: ${SLACK_ALLOWED_USERS}
    ports:
      - "8030:8030"
    profiles:
      - slack
    depends_on:
      brain:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    profiles:
      - tunnel
    depends_on:
      admin:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      admin:
        condition: service_started
      brain:
        condition: service_started
      provider-router:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-gem}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  bge_m3_cache:
  prometheus_data:
  grafana_data:
