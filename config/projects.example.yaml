    owner: "viktor"
    type: "work"
    status: "planned"
    aliases:
      - "hopin"
      - "hopin.it"
    repos: []
    pipelines: []
    providerPolicy:
      defaultChatProvider: "litellm"
      defaultCodeProvider: "codex"

  - id: aso-fabric
    name: "ASO Factory"
    owner: "viktor"
