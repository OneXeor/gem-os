    status: "planned"
    aliases:
      - "aso"
      - "fabric"
      - "factory"
      - "aso-factory"
    repos:
      - "git@github.com:OneXeor/ASO-Factory.git"
    pipelines:
      - "aso-monitor"
    providerPolicy:
      defaultChatProvider: "litellm"
      defaultCodeProvider: "codex"
