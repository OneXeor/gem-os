pipelines:
  - id: aso-monitor
    name: "ASO Monitor"
    stage: "mvp"
    enabled: false
    projectIds:
      - "aso-fabric"
    schedule:
      cron: "0 9 * * 1-5"
      timezone: "Europe/Warsaw"
    mode: "report-only"
    provider:
      chat: "litellm"
    outputs:
      slack: true
      admin: true

  - id: implementation
    name: "Implementation Pipeline"
    stage: "post-mvp"
    enabled: false
    mode: "manual-only"
    provider:
      codeAgent: "codex"
    safety:
      requireBranch: true
      requireTests: true
      requireHumanApprovalForPr: true
