providers:
  chat:
    default: "litellm"
    options:
      litellm:
        baseUrlEnv: "LITELLM_BASE_URL"
        apiKeyEnv: "LITELLM_API_KEY"
        defaultModel: "gem-chat"
      claude:
        apiKeyEnv: "ANTHROPIC_API_KEY"
        defaultModel: "claude-sonnet"

  codeAgent:
    default: "codex"
    options:
      codex:
        mode: "direct-cli"
        command: "codex"
        auth: "host"
        nonInteractive: true
        defaultArgs:
          - "exec"
        defaultModel: "latest"
      claude:
        mode: "direct-cli"
        command: "claude"
        auth: "host"
        nonInteractive: true
        defaultArgs:
          - "-p"
        defaultModel: "latest"
