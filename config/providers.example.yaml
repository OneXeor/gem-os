providers:
  chat:
    default: "litellm"
    options:
      litellm:
        baseUrlEnv: "LITELLM_BASE_URL"
        apiKeyEnv: "LITELLM_API_KEY"
        defaultModel: "gem-chat"
      claude:
        apiKeyEnv: "ANTHROPIC_API_KEY"
        defaultModel: "claude-sonnet"

  codeAgent:
    default: "codex"
    options:
      codex:
        mode: "cli-or-api"
        defaultModel: "latest"
      claude:
        mode: "claude-code-cli"
        defaultModel: "latest"
