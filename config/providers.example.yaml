providers:
  orchestration:
    mode: "capability-router"
    plannerDefault: "codex"
    plannerFallback: null
    defaultChatRoute: "litellm"
    defaultCodeRoute: "codex"
    defaultPipelineRoute: "scheduler"

  chat:
    default: "litellm"
    options:
      litellm:
        baseUrlEnv: "LITELLM_BASE_URL"
        apiKeyEnv: "LITELLM_API_KEY"
        defaultModel: "gem-chat"
      claude:
        apiKeyEnv: "ANTHROPIC_API_KEY"
        defaultModel: "claude-sonnet"

  codeAgent:
    default: "codex"
    options:
      codex:
        mode: "direct-cli"
        command: "codex"
        auth: "host"
        nonInteractive: true
        defaultArgs:
          - "exec"
        defaultModel: "latest"
      claude:
        mode: "direct-cli"
        command: "claude"
        auth: "host"
        enabled: false
        costProfile: "metered-agent-sdk-credit"
        notes: "Optional only: claude -p moves to separate Agent SDK credits on 2026-06-15."
        nonInteractive: true
        defaultArgs:
          - "-p"
        defaultModel: "latest"
