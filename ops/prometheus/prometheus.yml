global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "gem-admin"
    metrics_path: /metrics
    static_configs:
      - targets: ["admin:8000"]

  - job_name: "gem-provider-router"
    metrics_path: /metrics
    static_configs:
      - targets: ["provider-router:8010"]

  - job_name: "gem-brain"
    metrics_path: /metrics
    static_configs:
      - targets: ["brain:8020"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
