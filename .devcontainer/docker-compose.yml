services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    environment:
      GEM_HOME: /workspace/gem-os
      PYTHONPATH: /workspace/gem-os/packages:/workspace/gem-os
      DATABASE_URL: postgresql+psycopg://gem:gem@postgres:5432/gem
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      LITELLM_BASE_URL: http://litellm:4000
    volumes:
      - ..:/workspace/gem-os:cached
      - dev_venv:/workspace/gem-os/.venv
      - dev_pip_cache:/home/gem/.cache/pip
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gem
      POSTGRES_PASSWORD: gem
      POSTGRES_DB: gem
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gem -d gem"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - dev_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.4
    volumes:
      - dev_qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

volumes:
  dev_venv:
  dev_pip_cache:
  dev_postgres_data:
  dev_redis_data:
  dev_qdrant_data:
